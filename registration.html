<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration | DDR Academy</title>

    <meta name="description"
        content="Register for courses at DDR Academy.">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        <h2>DDR Academy</h2>
    </div>

    <nav>

        <ul>

            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="registration.html">Registration</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

</header>

<section class="register">

    <h1>Student Registration</h1>

    <p>Fill in your details to apply for admission.</p>

    <form id="registrationForm">

        <input type="text" id="name" placeholder="Full Name">

        <input type="email" id="email" placeholder="Email Address">

        <input type="tel" id="phone" placeholder="Mobile Number">

        <select id="course">

            <option value="">Select Course</option>
            <option>Full Stack Development</option>
            <option>Artificial Intelligence</option>
            <option>Data Science</option>
            <option>Cyber Security</option>
            <option>Cloud Computing</option>

        </select>

        <textarea id="message"
            placeholder="Why do you want to join DDR Academy?"
            rows="5"></textarea>

        <button type="submit">Submit Application</button>

    </form>

</section>

<footer>

    <p>© 2026 DDR Academy | All Rights Reserved</p>

</footer>

<script src="script.js"></script>

</body>

</html>
